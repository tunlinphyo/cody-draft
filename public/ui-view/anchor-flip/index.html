<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Me Card</title>
    <link rel="stylesheet" href="./style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
      fetchpriority="high">
  </head>
  <body>
    <main anchorgroup="anchorcard" open>
      <ul>
        <li><button anchoritem>Card One</button></li>
        <li><button anchoritem>Card Two</button></li>
        <li><button anchoritem>Card Three</button></li>
        <li><button anchoritem>Card Four</button></li>
        <li><button anchoritem>Card Five</button></li>
        <li><button anchoritem>Card Six</button></li>
        <li><button anchoritem>Card Seven</button></li>
        <li><button anchoritem>Card Eight</button></li>
        <li><button anchoritem>Card Nine</button></li>
        <li><button anchoritem>Card Ten</button></li>
        <li><button anchoritem>Card Eleven</button></li>
      </ul>

      <div anchorpos></div>

      <dialog anchortarget>
        <button anchorclose></button>
        <div class="scroll-y">
          <h1 id="title"></h1>
        </div>
      </dialog>
    </main>

    <script src="./anchor-polyfill.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
