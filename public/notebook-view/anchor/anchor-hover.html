<style>
:root {
  color-scheme: light dark;

  font-family: "Google Sans", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
  font-size: 100%;

  --surface: light-dark(
    color-mix(in oklab, Canvas, CanvasText 10%),
    color-mix(in oklab, Canvas, CanvasText 25%)
  );

  --ease-sine-in: cubic-bezier(.47,0,.745,.715);
  --ease-sine-in-out: cubic-bezier(.445,.05,.55,.95);
  --ease-sine-out: cubic-bezier(.39,.575,.565,1);

  --card-radius: 20px;
  --card-radius-large: 40px;
  --anim-ms: 320ms;
  --backdrop-ms: 220ms;
}

*, *::before, *::after {
  box-sizing: border-box;
}

:where(html, body) {
  width: 100%;
  height: 100%;

  margin: 0;
  padding: 0;
  background-color: light-dark(var(--surface), Canvas);
  color: CanvasText;
}

:where(body) {
  display: flex;
  justify-content: center;
  align-items: center;
}

:where(ul,li,a) {
  all: unset;
}

:where(ul) {
  display: flex;
  justify-content: center;
  align-items: center;
  padding-inline: 0.5rem;

  position: relative;
  z-index: 1;
  anchor-name: --anchorhover;

  & a {
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    color: ButtonText;

    width: 4rem;
    aspect-ratio: 3/2;

    &:is(:hover,:focus-visible) {
      anchor-name: --anchorhover;
    }
  }
}

:where(.blob) {
  position-anchor: --anchorhover;
  position: fixed;
  z-index: 0;
  top: anchor(top);
  left: anchor(left);
  bottom: anchor(bottom);
  right: anchor(right);
  pointer-events: none;

  background-color: ButtonFace;
  border: 1px solid light-dark(ButtonFace, ButtonBorder);
  box-shadow: rgba(0, 0, 0, 0.16) 0px 1px 4px;

  border-radius: 20px;
  @supports(corner-shape: squircle) {
    border-radius: 40px;
    corner-shape: squircle;
  }

  transition: all .6s var(--ease-spring-3);
}

:where([data-layer]) {
  *, *::before, *::after {
    outline: 1px dotted hotpink;
  }
}

/* OPEN PROPS https://open-props.style/#easing */
:where(html) {
  --ease-spring-3: linear(
    0, 0.009, 0.035 2.1%, 0.141 4.4%, 0.723 12.9%, 0.938 16.7%, 1.017, 1.077,

    1.051 39.6%, 1.017 43.1%, 0.991, 0.977 51%, 0.974 53.8%, 0.975 57.1%,
    0.997 69.8%, 1.003 76.9%, 1
  );

  --ease-sine-out: cubic-bezier(.39, .575, .565, 1);
}
