<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>user-pseudos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
  rel="stylesheet"
  fetchpriority="high">
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&icon_names=notifications&display=swap">
<style>
:root {
  color-scheme: light dark;
  interpolate-size: allow-keywords;

  font-family: "Google Sans", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
  font-size: 100%;

  --accent: light-dark(orangered, chartreuse);
  --surface: light-dark(
    Canvas,
    color-mix(in oklab, Canvas, CanvasText 30%)
  );
}

*, *::before, *::after {
  box-sizing: border-box;
}

:where(html,body) {
  margin: 0;
  padding: 0;
  background-color: Canvas;
  color: CanvasText;

  /* overscroll-behavior-block: none; */
}

:where(header) {
  width: 100%;
  height: 4rem;
  background-color: oklch(from Canvas l c h / 0.5);
  backdrop-filter: blur(5px);
  border-bottom: 2px solid Canvas;

  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-inline: 1rem;

  position: sticky;
  z-index: 9;
  top: 0;

  :is(h1) {
    all: unset;
    font-size: 1.2rem;
  }
}

:where(fieldset) {
  all: unset;

  display: grid;
  grid-auto-flow: column;
  gap: 0.75rem;

  & label {
    display: grid;
    place-content: center;
    width: 1.25rem;
    aspect-ratio: 1;
    border-radius: 50%;
    cursor: pointer;

    &:has([value="pink"]) {
      background-color: light-dark(deeppink, hotpink);
    }
    &:has([value="blue"]) {
      background-color: light-dark(deepskyblue, skyblue);
    }
    &:has([value="green"]) {
      background-color: light-dark(forestgreen, darkseagreen);
    }

    &:has(:checked) {
      outline: 2px solid currentColor;
      outline-offset: 2px;
    }

    & > * {
      cursor: pointer;
      opacity: 0;
    }
  }
}

:where(main) {
  padding: 1rem;
  padding-block-start: 0;
}

:where(.message) {
  margin: 0;
  padding: 0.75rem;
  border: 1px solid var(--accent);
  color: var(--accent);
  background-color: oklch(from var(--accent) l c h / 0.1);

  display: grid;
  grid-template-columns: auto 1fr;
  gap: 0.5rem;
  font-size: 0.9rem;

  &::before {
    content: 'notifications';
    font-family: "Material Symbols Outlined";
    font-weight: 100;
    font-style: normal;
    font-size: 1.2rem;
    color: var(--accent);
  }

  border-radius: 15px;
  @supports(corner-shape: squircle) {
    border-radius: 30px;
    corner-shape: squircle;
  }
}

:where(form) {
  display: grid;
  gap: 1rem;
  padding-block: 1rem;
}

.form-control {
  display: grid;
  --bg-color: color-mix(in oklab, var(--accent), Canvas 90%);

  & label {
    font-size: 0.8rem;
    color: GrayText;
  }

  input {
    padding: 0.5rem 0.75rem;
    border: 1px solid GrayText;
    caret-color: var(--accent);
    caret-shape: block;
    --border: var(--accent);

    border-radius: 15px;
    @supports(corner-shape: squircle) {
      border-radius: 30px;
      corner-shape: squircle;
    }

    &::placeholder {
      color: GrayText;
    }

    &:focus {
      outline: 1px solid var(--border);
      border-color: var(--border);
    }

    &:autofill {
      box-shadow: inset 0 0 0 5rem var(--bg-color);
      border: 2px dotted var(--accent);
    }

    &:user-valid {
      --border: green;
      background-color: oklch(from green l c h / 0.1);
      color: green;
      border-color: green;
    }
    &:user-invalid {
      --border: red;
      background-color: oklch(from red l c h / 0.1);
      color: red;
      border-color: red;
    }
  }
}

:where([data-layer]) {
  *, *::before, *::after {
    outline: 1px dotted hotpink;
  }
}

:where(html) {
  --ease-sine-in: cubic-bezier(.47,0,.745,.715);
  --ease-sine-in-out: cubic-bezier(.445,.05,.55,.95);
  --ease-sine-out: cubic-bezier(.39,.575,.565,1);
}
</style>
</head>
<body>
<header>
  <h1>user-pseudos</h1>
  <fieldset>
    <label>
      <input type="radio" name="theme" value="pink" checked>
    </label>
    <label>
      <input type="radio" name="theme" value="blue">
    </label>
    <label>
      <input type="radio" name="theme" value="green">
    </label>
  </fieldset>
</header>
<main>
  <p class="message">
    Try to input valid and invalid data to form
  </p>
  <form>
    <div class="form-control">
      <label for="email">Email Address</label>
      <input id="email" name="email" type="email" value="" required />
    </div>

    <div class="form-control">
      <label for="secret">Secret Code (lower case letters)</label>
      <input id="secret" name="secret" type="text" value="" pattern="[a-z]+" required />
    </div>

    <div class="form-control">
      <label for="secret2">Secret Code 2 (upper case letters)</label>
      <input id="secret" name="secret2" type="text" value="" pattern="[A-Z]+" required />
    </div>

    <div class="form-control">
      <label for="age">Your age (18+)</label>
      <input id="age" name="age" type="number" value="" min="18" required />
    </div>
  </form>
</main>
<script>
function themePicker() {
  const fieldset = document.querySelector("fieldset")
  const root = document.documentElement

  const setAccent = (value) => {
    let theme = value
    if (value === 'pink') theme = 'light-dark(deeppink, hotpink)'
    if (value === 'blue') theme = 'light-dark(deepskyblue, skyblue)'
    if (value === 'green') theme = 'light-dark(forestgreen, darkseagreen)'
    root.style.setProperty("--accent", theme)
  }

  fieldset.addEventListener("change", ({ target }) => {
    if (target.name === "theme") {
      setAccent(target.value)
    }
  })

  setAccent(fieldset.querySelector(":checked").value)
}

themePicker()
</script>
</body>
</html>
