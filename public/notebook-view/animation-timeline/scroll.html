<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>scroll()</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
  rel="stylesheet"
  fetchpriority="high">
<style>
:root {
  color-scheme: light dark;

  font-family: "Google Sans", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
  font-size: 100%;

  --padding-x: 0.5rem;
  --surface: light-dark(
    color-mix(in oklab, Canvas, CanvasText 10%),
    color-mix(in oklab, Canvas, CanvasText 25%)
  );
}

*, *::before, *::after {
  box-sizing: border-box;
}

:where(html,body) {
  margin: 0;
  padding: 0;
  background-color: light-dark(var(--surface), Canvas);
  color: CanvasText;
}

:where(article) {
  width: 100%;
  height: 500vh;

  opacity: 0.3;
  background-image:  linear-gradient(LinkText 1px, transparent 1px), linear-gradient(to right, LinkText 1px, transparent 1px);
  background-size: 20px 20px;
}

:where(ul) {
  position: fixed;
  inset: 0;
  margin: 0;
  padding: 0.5rem;

  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
:where(li) {
  height: 10vh;

  display: flex;
  justify-content: center;
  align-items: center;
  font-size: clamp(1.2rem, 6vw, 3rem);
  background-color: light-dark(Canvas, var(--surface));

  border-radius: 15px;
  @supports(corner-shape: squircle) {
    border-radius: 30px;
    corner-shape: squircle;
  }

  &.nearest-block {
    position: relative;
    overflow: clip;

    &::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: ActiveText;
      transform-origin: left center;
      scale: 0 1;

      animation: scale-x auto linear forwards;
      animation-timeline: scroll(nearest block);
    }

    &::after {
      content: 'Full range';
      font-size: 1rem;
      position: absolute;
      inset: 0;
      text-align: center;
      vertical-align: middle;
      line-height: 10vh;
    }

    &.with-range {
      &::before {
        animation-range: 25% 75%;
      }
      &::after {
        content: 'animation-range: 25% 75%;';
      }
    }
  }

  &.cube {
    width: 4rem;
    height: 4rem;
    margin: 0 auto;

    animation: rotate-cube auto linear;
    animation-timeline: scroll(nearest block);
  }

  &.pages {
    height: 50vh;
    position: relative;
    overflow: clip;

    > * {
      opacity: 0;
      pointer-events: none;
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .intro {
      opacity: 1;
      animation: page-intro auto linear forwards;
      animation-range: 0% 10%;
    }
    .one {
      animation: page-start auto linear forwards;
      animation-range: 5% 25%;
    }
    .two {
      animation: page-middle auto linear forwards;
      animation-range: 25% 50%;
    }
    .three {
      animation: page-three auto linear forwards;
      animation-range: 50% 75%;
    }
    .four {
      animation: page-end auto linear forwards;
      animation-range: 75% 100%;
    }

    .intro,.one,.two,.three,.four {
      animation-timeline: scroll(nearest block);
    }
  }
}

:where([data-layer]) {
  *, *::before, *::after {
    outline: 1px dotted hotpink;
  }
}

@keyframes scale-x {
  0% { scale: 0 1; }
  100% { scale: 1 1; }
}
@keyframes rotate-cube {
  to { rotate: 360deg; }
}
@keyframes page-intro {
  0% { scale: 1; }
  100% { opacity: 0; scale: 0; }
}
@keyframes page-start {
  0% { opacity: 1; scale: 0; }
  75% { opacity: 1; }
  100% { opacity: 0; scale: 3; }
}
@keyframes page-middle {
  0% { opacity: 1; translate: -100% 0; }
  25%, 75% { translate: 0 0; }
  100% { opacity: 1; translate: 100% 0; }
}
@keyframes page-three {
  0% { opacity: 1; translate: 0 -100%; }
  100% { opacity: 1; translate: 0 100%; }
}
@keyframes page-end {
  0% { opacity: 1; translate: 0 100%; }
  100% { opacity: 1; translate: 0 0; }
}

  --ease-spring-3: linear(
    0, 0.009, 0.035 2.1%, 0.141 4.4%, 0.723 12.9%, 0.938 16.7%, 1.017, 1.077,
    1.121, 1.149 24.3%, 1.159, 1.163, 1.161, 1.154 29.9%, 1.129 32.8%,
    1.051 39.6%, 1.017 43.1%, 0.991, 0.977 51%, 0.974 53.8%, 0.975 57.1%,
    0.997 69.8%, 1.003 76.9%, 1
  );
} */
</style>
</head>
<body>
<article></article>
<ul>
  <li class="nearest-block"></li>
  <li class="nearest-block with-range"></li>
  <li class="pages">
    <h1 class="intro">Scroll()</h1>
    <h1 class="one">Hello World!</h1>
    <h1 class="two">Welcome!</h1>
    <h1 class="three">to</h1>
    <p class="four">scroll driven animations</p>
  </li>
  <li class="cube">Rotate</li>
</ul>
</body>
</html>
