<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>view()</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
  rel="stylesheet"
  fetchpriority="high">
<style>
:root {
  color-scheme: light dark;

  font-family: "Google Sans", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
  font-size: 100%;

  --card-height: 20vh;
  --padding-x: 0.5rem;
  --surface: light-dark(
    color-mix(in oklab, Canvas, CanvasText 10%),
    color-mix(in oklab, Canvas, CanvasText 25%)
  );
}

*, *::before, *::after {
  box-sizing: border-box;
}

:where(html,body) {
  margin: 0;
  padding: 0;
  background-color: light-dark(var(--surface), Canvas);
  color: CanvasText;
}

:where(body) {
  &::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(
      to bottom,
      transparent 0,
      transparent calc(var(--card-height) - 1px),
      LinkText calc(var(--card-height) - 1px),
      LinkText calc(var(--card-height) + 1px),
      transparent calc(var(--card-height) + 1px),
      transparent calc(50vh - 1px),
      LinkText calc(50vh - 1px),
      LinkText calc(50vh + 1px),
      transparent calc(50vh + 1px),
      transparent calc(100vh - var(--card-height) - 1px),
      LinkText calc(100vh - var(--card-height) - 1px),
      LinkText calc(100vh - var(--card-height) + 1px),
      transparent calc(100vh - var(--card-height) + 1px),
      transparent 100%
    );
  }
}

:where(article) {
  height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  justify-content: center;
  align-items: center;
  font-size: 2rem;

  &::after {
    display: block;
    content: "\279F";
    rotate: 90deg;
  }

  &.bottom {
    flex-direction: column-reverse;

    &::after {
      rotate: -90deg;
    }
  }
}

:where(ul) {
  margin: 0;
  list-style: none;
  padding: 1rem;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 50vh;
}

:where(li) {
  width: min(16rem, 90%);
  height: var(--card-height);
  background-color: light-dark(Canvas, var(--surface));
  position: relative;
  overflow: clip;

  border-radius: 20px;
  @supports(corner-shape: squircle) {
    border-radius: 40px;
    corner-shape: squircle;
  }

  &::before {
    content: '';
    position: absolute;
    inset: 0;
    background-color: Highlight;
    transform-origin: left center;
    scale: 0 1;

    animation: scale-x auto linear forwards;
    animation-timeline: view();
  }
  &::after {
    content: '';
    font-size: 1rem;
    position: absolute;
    inset: 0;
    display: grid;
    place-content: center;
    text-align: center;
  }

  &.default{
    &::after {
      content: 'view()';
    }
  }
  &.range-cover {
    &::before {
      animation-timeline: view(50vh 0);
      animation-range: cover;
    }
    &::after {
      content: 'animation-timeline: view(50vh 0)';
    }
  }
  &.range-contain {
    &::before {
      animation-range: contain;
    }
    &::after {
      content: 'animation-range: contain';
    }
  }
  &.range-cover-contain {
    &::before {
      animation-range: cover contain;
    }
    &::after {
      content: 'animation-range: cover contain';
    }
  }
  &.range-contain-cover {
    &::before {
      animation-range: contain cover;
    }
    &::after {
      content: 'animation-range: contain cover';
    }
  }
  &.range-entry-exit {
    &::before {
      animation-range: entry 50% exit 50%;
    }
    &::after {
      content: 'animation-range: entry 50% exit 50%';
    }
  }
  &.range-cover-exit {
    &::before {
      animation-range: cover 50% exit 100%;
    }
    &::after {
      content: 'animation-range: cover 50% exit 100%';
    }
  }
}

:where([data-layer]) {
  *, *::before, *::after {
    outline: 1px dotted hotpink;
  }
}

@keyframes scale-x {
  0% { scale: 0 1; }
  100% { scale: 1 1; }
}
</style>
</head>
<body>
<article>Scroll</article>
<ul>
  <li class="default"></li>
  <li class="range-cover"></li>
  <li class="range-contain"></li>
  <li class="range-cover-contain"></li>
  <li class="range-contain-cover"></li>
  <li class="range-entry-exit"></li>
  <li class="range-cover-exit"></li>
</ul>
<article class="bottom">Scroll</article>
</body>
</html>
