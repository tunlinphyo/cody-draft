<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>:empty</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
  rel="stylesheet"
  fetchpriority="high">
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&icon_names=progress_activity&display=swap">
<style>
:root {
  color-scheme: light dark;
  interpolate-size: allow-keywords;

  font-family: "Google Sans", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
  font-size: 100%;

  --accent: light-dark(orangered, chartreuse);
  --surface: light-dark(
    Canvas,
    color-mix(in oklab, Canvas, CanvasText 30%)
  );
}

*, *::before, *::after {
  box-sizing: border-box;
}

:where(html,body) {
  margin: 0;
  padding: 0;
  background-color: Canvas;
  color: CanvasText;

  /* overscroll-behavior-block: none; */
}

:where(header) {
  width: 100%;
  height: 4rem;
  background-color: oklch(from Canvas l c h / 0.5);
  backdrop-filter: blur(5px);
  border-bottom: 2px solid Canvas;

  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-inline: 1rem;

  position: sticky;
  z-index: 9;
  top: 0;

  :is(h1) {
    all: unset;
    font-size: 1.2rem;
  }
}

:where(fieldset) {
  all: unset;

  display: grid;
  grid-auto-flow: column;
  gap: 0.75rem;

  & label {
    display: grid;
    place-content: center;
    width: 1.25rem;
    aspect-ratio: 1;
    border-radius: 50%;
    cursor: pointer;

    &:has([value="pink"]) {
      background-color: light-dark(deeppink, hotpink);
    }
    &:has([value="blue"]) {
      background-color: light-dark(deepskyblue, skyblue);
    }
    &:has([value="green"]) {
      background-color: light-dark(forestgreen, darkseagreen);
    }

    &:has(:checked) {
      outline: 2px solid currentColor;
      outline-offset: 2px;
    }

    & > * {
      cursor: pointer;
      opacity: 0;
    }
  }
}

:where(main) {
  padding: 1rem;
}

p {
  margin-block: 1rem;

  border-radius: 15px;
  @supports(corner-shape: squircle) {
    border-radius: 30px;
    corner-shape: squircle;
  }

  &:empty {
    padding: 0.5rem 1rem;
    outline: 2px dotted var(--accent);
    color: var(--accent);

    &::before {
      content: 'You can show a loading by using ::before and ::after with empty content.';
    }
  }
}

.with-loading:empty {
  padding: 1rem;
  outline: 2px dotted var(--accent);
  color: var(--accent);

  display: flex;
  justify-content: center;
  align-items: center;

  &::before {
    content: "progress_activity";
    font-family: "Material Symbols Outlined";
    font-weight: 100;
    font-style: normal;
    font-size: 1.5rem;
    display: inline-block;
    color: var(--accent);
    animation: loading .7s var(--ease-sine-out) infinite;
  }
}

@keyframes loading {
  to { rotate: 360deg; }
}

:where([data-layer]) {
  *, *::before, *::after {
    outline: 1px dotted hotpink;
  }
}

:where(html) {
  --ease-sine-in: cubic-bezier(.47,0,.745,.715);
  --ease-sine-in-out: cubic-bezier(.445,.05,.55,.95);
  --ease-sine-out: cubic-bezier(.39,.575,.565,1);
}
</style>
</head>
<body>
<header>
  <h1>:empty</h1>
  <fieldset>
    <label>
      <input type="radio" name="theme" value="pink" checked>
    </label>
    <label>
      <input type="radio" name="theme" value="blue">
    </label>
    <label>
      <input type="radio" name="theme" value="green">
    </label>
  </fieldset>
</header>
<main>
  <p>The <code>:empty</code> pseudo-class matches elements with no child nodes, so the paragraph below gets styled while this one does not.</p>
  <p>This is not empty paragraph</p>
  <p></p>
  <p class="with-loading"></p>
</main>
<script>
function themePicker() {
  const fieldset = document.querySelector("fieldset")
  const root = document.documentElement

  const setAccent = (value) => {
    let theme = value
    if (value === 'pink') theme = 'light-dark(deeppink, hotpink)'
    if (value === 'blue') theme = 'light-dark(deepskyblue, skyblue)'
    if (value === 'green') theme = 'light-dark(forestgreen, darkseagreen)'
    root.style.setProperty("--accent", theme)
  }

  fieldset.addEventListener("change", ({ target }) => {
    if (target.name === "theme") {
      setAccent(target.value)
    }
  })

  setAccent(fieldset.querySelector(":checked").value)
}

themePicker()
</script>
</body>
</html>
