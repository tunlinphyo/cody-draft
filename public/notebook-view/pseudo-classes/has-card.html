<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>:has()</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
  rel="stylesheet"
  fetchpriority="high">
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=block">
<style>
:root {
  color-scheme: light dark;
  /* interpolate-size: allow-keywords; */

  font-family: "Google Sans", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
  font-size: 100%;

  --accent: light-dark(orangered, chartreuse);
  --gray: oklch(from CanvasText l c h / 0.4);
  --muted: oklch(from CanvasText l c h / 0.1);
  --surface: light-dark(
    Canvas,
    color-mix(in oklab, Canvas, CanvasText 30%)
  );
}

*, *::before, *::after {
  box-sizing: border-box;
}

:where(html,body) {
  margin: 0;
  padding: 0;
  background-color: Canvas;
  color: CanvasText;

  width: 100%;
  height: 100%;
}

:where(ul,li) {
  all: unset;
}

:where(main) {
  width: 100%;
  height: 100%;

  display: flex;
  justify-content: center;
  align-items: center;
  padding-block-end: 0.5rem;
}

:where(.email-container,.name-container,.instagram-container,.website-container) {
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  position: relative;
  
  &::after {
    display: block;
    position: absolute;

    font-size: 0.8rem;
    color: var(--gray);
    text-align: center;
    width: 100%;
    height: 0.5rem;
    max-height: 0.5rem;
    border: 1px dashed var(--muted);
    border-top: none;
    line-height: 3;

    left: 0; right: 0;
    bottom: -2px;
    opacity: 0;
    translate: 0 -150%;

    transition: all 0.3s var(--ease-sine-out);
  }
}

.email-container::after {
  content: 'Email';
}
.name-container::after {
  content: 'Name';
}
.instagram-container::after {
  content: 'Instagram';
}
.website-container::after {
  content: 'Website';
}

:where(ul) {
  position: absolute;
  z-index: 1;
  left: 50%;
  bottom: 2rem;
  translate: -50% 0;

  display: flex;
  justify-content: center;
  align-items: center;
  gap: 1rem;

  li a {
    display: grid;
    place-content: center;
    width: 1.5rem;
    aspect-ratio: 1;
    text-decoration: none;
    color: var(--gray);
    
    &::before {
      font-family: "Material Symbols Outlined";
      font-style: normal;
      font-size: 1.5rem;
      line-height: 1;
      display: block;
      transition: all 0.3s var(--ease-sine-out);
    }
    
    &.name::before {
      content: "person";
      font-size: 1.7rem;
    }
    &.website::before {
      content: "link_2";
    }
    &.email::before {
      content: "mail";
      font-size: 1.4rem;
    }
    &.instagram::before {
      content: "alternate_email";
      font-size: 1.4rem;
    }

    &:hover {
      &::before {
        color: CanvasText;
        translate: 0 -0.25rem;
      }
    }
  }
}

:where(main:has(a:hover)) {
  .email-container {
    color: var(--muted);
  }
}
:where(main:has(.name:hover)) {
  .name-container {
    color: var(--accent);
    &::after {
      opacity: 1;
      translate: 0 0;
    }
  }
}
:where(main:has(.website:hover)) {
  .website-container {
    color: var(--accent);
    &::after {
      opacity: 1;
      translate: 0 0;
    }
  }
}
:where(main:has(.email:hover)) {
  .email-container {
    color: var(--accent);
    &::after {
      opacity: 1;
      translate: 0 0;
    }
  }
}
:where(main:has(.instagram:hover)) {
  .instagram-container {
    color: var(--accent);
    &::after {
      opacity: 1;
      translate: 0 0;
    }
  }
}

:where([data-layer]) {
  *, *::before, *::after {
    outline: 1px dotted hotpink;
  }
}

:where(html) {
  --ease-sine-in: cubic-bezier(.47,0,.745,.715);
  --ease-sine-in-out: cubic-bezier(.445,.05,.55,.95);
  --ease-sine-out: cubic-bezier(.39,.575,.565,1);
}
</style>
</head>
<body>  
<main>
  <div class="email-container">
    <div class="name-container">tunlinphyo</div>
    <div class="instagram-container">
      @<div class="website-container">unique.com</div>
    </div>
  </div>
  <ul class="links">
    <li><a href="#" class="name"></a></li>
    <li><a href="#" class="website"></a></li>
    <li><a href="#" class="email"></a></li>
    <li><a href="#" class="instagram"></a></li>
  </ul>
</main>
</body>
</html>
