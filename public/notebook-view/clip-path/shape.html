<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shape()</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
  rel="stylesheet"
  fetchpriority="high">
<style>
:root {
  color-scheme: light dark;

  font-family: "Google Sans", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
  font-size: 100%;

  --accent: light-dark(orangered, chartreuse);
  --surface: light-dark(
    color-mix(in oklab, Canvas, CanvasText 10%),
    color-mix(in oklab, Canvas, CanvasText 25%)
  );
}

* {
  box-sizing: border-box;
}

:where(html,body) {
  width: 100%;
  margin: 0;
  padding: 0;
  background-color: Canvas;
  color: CanvasText;
}

:where(h1,p,button) {
  all: unset;
}

:where(main) {
  width: 100%;
  padding: 2rem;

  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 1rem;
}

:where(.box) {
  width: 10rem;
  aspect-ratio: 1;

  background-color: var(--accent);

  display: grid;
  place-content: center;
}

:where(.box--one) {
  --corner: 2rem;
  --curve: 0rem;
  clip-path: shape(
    from var(--corner) 0%,
    line to calc(100% - var(--corner)) 0%,
    arc to 100% var(--corner) of var(--curve),
    line to 100% calc(100% - var(--corner)),
    arc to calc(100% - var(--corner)) 100% of var(--curve),
    line to var(--corner) 100%,
    arc to 0% calc(100% - var(--corner)) of var(--curve),
    line to 0% var(--corner),
    arc to var(--corner) 0% of var(--curve),
    close
  );
}

:where(.box--two) {
  --corner: 3rem;
  --curve: 0.5rem;
  clip-path: shape(
    from var(--corner) 0%,
    line to calc(100% - var(--corner)) 0%,
    curve to 100% var(--corner) with calc(100% - var(--curve)) 0% / 100% var(--curve),
    line to 100% calc(100% - var(--corner)),
    curve to calc(100% - var(--corner)) 100% with 100% calc(100% - var(--curve)) / calc(100% - var(--curve)) 100%,
    line to var(--corner) 100%,
    curve to 0% calc(100% - var(--corner)) with var(--curve) 100% / 0% calc(100% - var(--curve)),
    line to 0% var(--corner),
    curve to var(--corner) 0% with 0% var(--curve) / var(--curve) 0%,
    close
  );
}


:where([data-layer]) {
  *, *::before, *::after {
    outline: 1px dotted hotpink;
  }
}
</style>
</head>
<body>
<main>
  <div class="box box--one">

  </div>
  <div class="box box--two">
    <svg xmlns="http://www.w3.org/2000/svg" width="88" height="60" viewBox="0 0 21 16">
      <style>
        .draw {
          stroke-dasharray: 105;
          stroke-dashoffset: 105;
          animation: draw var(--duration) linear forwards;
          animation-delay: var(--delay);
        }

        @keyframes draw {
          to {
            stroke-dashoffset: 0;
          }
        }
      </style>
      <g stroke="#000" stroke-width="1.5" fill="none">
        <path class="draw" stroke-width="1.5" style="--duration: 150ms; --delay: 200ms" pathLength="100" d="M9 1L4 15" />
        <path class="draw" stroke-width="1.5" style="--duration: 150ms; --delay: 350ms" pathLength="100" d="M1 6L20 2" />
        <path class="draw" stroke-width="1.2" style="--duration: 200ms; --delay: 500ms" pathLength="100" d="M9 6L8 9Q7 13 11 8T12.5 8T14 8Q18 2 17 7T18 8" />
        <text
          class="draw"
          x="14"
          y="15"
          text-anchor="middle"
          font-family="Google Sans, sans-serif"
          font-size="2.8"
          font-weight="700"
          letter-spacing="0.15"
          fill="#000"
          stroke="none"
          style="--duration: 180ms; --delay: 600ms"
          pathLength="100">UNIQUE</text>
      </g>
    </svg>
  </div>
  <div class="box box--two">
    <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 24 24">
      <style>
        .draw {
          stroke-dasharray: 105;
          stroke-dashoffset: 105;
          animation: draw var(--duration) linear forwards;
          animation-delay: var(--delay);
        }

        @keyframes draw {
          to {
            stroke-dashoffset: 0;
          }
        }
      </style>
      <g stroke="#000" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path class="draw" style="--duration: 300ms; --delay: 200ms" pathLength="100" d="M12 5Q18 27 6 20T12 11Q26 9 20 13T18 12T17 8T23 1" />
        <path class="draw" style="--duration: 100ms; --delay: 500ms" pathLength="100" d="M3 7Q4 8 4 10" />
        <path class="draw" style="--duration: 100ms; --delay: 600ms" pathLength="100" d="M8 6Q9 7 9 9" />
      </g>
    </svg>
  </div>
  <div class="box box--one">
    <svg xmlns="http://www.w3.org/2000/svg" width="128" height="60" viewBox="0 0 32 15">
      <style>
        .draw {
          stroke-dasharray: 105;
          stroke-dashoffset: 105;
          animation: draw var(--duration) linear forwards;
          animation-delay: var(--delay);
        }

        @keyframes draw {
          to {
            stroke-dashoffset: 0;
          }
        }
      </style>
      <g stroke="#000" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path class="draw" style="--duration: 300ms; --delay: 200ms" pathLength="100" d="M1 14Q4 -9 6 8Q7 22 9 3C7 16 11 15 13 12C14 10 11 8 9 9L16 9C11 11 15 14 17 14C19 14 21 11 17 9L20 9C18 18 26 13 24 9C26 21 28 9 28 3" />
        <path class="draw" style="--duration: 100ms; --delay: 500ms" pathLength="100" d="M1 7L31 7" />
      </g>
    </svg>
  </div>
</main>
</body>
</html>
