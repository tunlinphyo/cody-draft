<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>interestfor</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
  rel="stylesheet"
  fetchpriority="high">

<script
  type="module"
  async
  src="/assets/interestfor.min.js"
></script>
<style>
:root {
  color-scheme: light dark;

  font-family: "Google Sans", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
  font-size: 100%;

  --accent: light-dark(orangered, chartreuse);
  --surface: light-dark(
    color-mix(in oklab, Canvas, CanvasText 5%),
    color-mix(in oklab, Canvas, CanvasText 10%)
  );
}

*, *::before, *::after {
  box-sizing: border-box;
}

:where(html,body) {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  background-color: var(--surface);
  color: CanvasText;
}

:where(main) {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-rows: 1fr auto 1fr;
  justify-content: center;

  .putend {
    padding: 1rem;
    display: flex;
    justify-content: center;
    align-items: flex-end;
  }
}

:where(button) {
  background-color: ButtonFace;
  color: ButtonText;
  border: 1px solid ButtonBorder;
  font-size: 0.75rem;
  text-transform: uppercase;
  font-weight: 600;
  letter-spacing: 2px;
  padding: 0.25rem 0.75rem;
  cursor: pointer;

  position: relative;

  border-radius: 10px;
  @supports(corner-shape: squircle) {
    border-radius: 20px;
    corner-shape: squircle;
  }

  &:is(:hover,:focus-visible) {
    background-color: transparent;
    outline: 2px solid ActiveText;
    outline-offset: 1px;
  }
}

:where(a) {
  display: inline-block;
  padding-inline: 0.5rem;
  border-radius: 0.25rem;
  @supports(corner-shape: squircle) {
    border-radius: 1rem;
    corner-shape: squircle;
  }
}

[interestfor] {
  interest-delay: 0.2s;
}
:interest-source {
  background-color: var(--accent);
  color: contrast-color(var(--accent));
}

[popover] {
  position: absolute;
  margin: 0;
  padding: 0;
  inset: auto;
  position-area: top;

  border: none;
  outline: none;
  background-color: transparent;
  overflow: visible;
  max-width: 100%;
  max-height: 100%;

  .popover {
    min-width: 200px;
    max-width: 25ch;
    background-color: Canvas;
    box-shadow: rgba(0, 0, 0, 0.1) 0px 4px 12px;
    padding: 1rem;
    scale: 0.5;
    opacity: 0;
    translate: 0 0;
    transform-origin: bottom center;
    transition: all 0.2s var(--ease-sine-out);
    position: relative;

    &::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      translate: -50% 40%;
      background-color: Canvas;

      width: 0.6rem;
      aspect-ratio: 1;
      rotate: 45deg;
    }

    & p {
      margin: 0;
    }

    border-radius: 20px;
    @supports(corner-shape: squircle) {
      border-radius: 40px;
      corner-shape: squircle;
    }
  }

  &:popover-open {
    .popover {
      scale: 1;
      opacity: 1;
      translate: 0 -0.5rem;

      @starting-style {
        scale: 0.5;
        opacity: 0;
        translate: 0 0;
      }
    }
  }

  @supports (animation-name: test-starting-style) {
    transition:
      display 0.2s allow-discrete,
      overlay 0.2s allow-discrete;
  }
}

#interest3 {
  .popover {
    width: 90vw;
    max-width: 90vw;
    height: 15rem;
    padding: 0;
    overflow: clip;

    & iframe {
      width: 100%;
      height: 100%;
    }
  }

  &:popover-open {
    .popover {
      translate: 0 0;
    }
  }
}

:where([data-layer]) {
  *, *::before, *::after {
    outline: 1px dotted hotpink;
  }
}

:where(html) {
  --ease-sine-in: cubic-bezier(.47,0,.745,.715);
  --ease-sine-in-out: cubic-bezier(.445,.05,.55,.95);
  --ease-sine-out: cubic-bezier(.39,.575,.565,1);
}
</style>
</head>
<body>
<main>
  <div></div>
  <div>
    <button interestfor="interest1">Hover Me</button>
    <button interestfor="interest2">Hover Me</button>
  </div>
  <div class="putend">
    <!-- <a href="https://tun-online.web.app/" target="_blank" interestfor="interest3">Tun's Portfolio</a> -->
  </div>
</main>

<div id="interest1" popover="hint">
  <div class="popover">
    <p>
      This popover opens when you hover the first button.
    </p>
  </div>
</div>
<div id="interest2" popover="hint">
  <div class="popover">
    <p>
      This popover opens when you hover the second button.
    </p>
  </div>
</div>
<!-- <div id="interest3" popover="hint">
  <div class="popover">
    <iframe src="https://tun-online.web.app/" frameborder="0"></iframe>
  </div>
</div> -->

<script>
const iframe = document.querySelector('iframe')

iframe.addEventListener('load', () => {
  iframe.style.transform = 'scale(0.5)'
  iframe.style.transformOrigin = 'top left'
  iframe.style.width = '200%'
  iframe.style.height = '200%'
})
</script>
</body>
</html>
