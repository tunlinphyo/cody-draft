<h2 id="anchor-scope">anchor-scope</h2>
<themed-iframe src="/notebook-view/motion-path/people.html" title="anchor-scope" max-width="20rem" height="24rem"></themed-iframe>
<p>This demo used <a href="../polyfills/toggle-polyfill.md">toggle-polyfill</a>.</p>
<aside class="markdown-card markdown-card--warning"><p class="markdown-card__title">Warning</p>
<p>Centering is handled in <code>@container anchored(fallback: --try-center)</code> rather than in the base <code>[popover]</code> rule. When <code>justify-self: anchor-center</code> is used as the default placement, <code>position-try-fallbacks</code> never run, so it only works reliably as a fallback, which keeps the transition origin and bubble arrow aligned with the anchor. Tested in Chrome 146.0.7680.178.</p>
</aside>
