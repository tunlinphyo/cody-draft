    <h1>animation-timeline</h1>
<hr>
<feature-status featureId="scroll-driven-animations"></feature-status>
<h2 id="timeline">Timeline</h2>
<p>This demo builds a scroll-driven one-page portfolio with fixed layers that animate as the page moves. It uses <code>animation-timeline: scroll()</code> with different <code>animation-range</code> values to sync each section to scroll progress, and <code>scroll-marker-group</code> to place the marker navigation generated from <code>::scroll-marker</code>. Everything is done with CSS only, with no JavaScript.</p>
<aside class="markdown-card markdown-card--info"><p class="markdown-card__title">Info</p>
<p>This demo is best viewed on a large screen.</p>
</aside>
<themed-iframe
  src="/ui-view/animation-timeline/index.html"

  max-width="32rem"
  height="20rem"></themed-iframe>

<aside class="markdown-card markdown-card--tip"><p class="markdown-card__title">ORDER MATTERS</p>
<p>Always declare <code>animation-timeline</code> after <code>animation</code>; otherwise, it will be overwritten.</p>
